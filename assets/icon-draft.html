<!DOCTYPE html>
<html>
<head>
<style>
  body { background: #2a2a3a; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
  canvas { image-rendering: pixelated; border-radius: 90px; }
</style>
</head>
<body>
<canvas id="c" width="64" height="64"></canvas>
<script>
const c = document.getElementById('c');
c.style.width = '512px';
c.style.height = '512px';
const ctx = c.getContext('2d');

function rect(x, y, w, h, color) {
  ctx.fillStyle = color;
  ctx.fillRect(x, y, w, h);
}
function px(x, y, color) {
  ctx.fillStyle = color;
  ctx.fillRect(x, y, 1, 1);
}

// === SKY / BACKGROUND — warm evening ===
rect(0, 0, 64, 64, '#1a1028');
rect(0, 0, 64, 8, '#251830');
rect(0, 8, 64, 4, '#201428');

// === RED & WHITE STRIPED AWNING ===
rect(6, 12, 52, 1, '#8B4513');

for (let i = 0; i < 8; i++) {
  let color = i % 2 === 0 ? '#d03030' : '#f0e8e0';
  rect(4 + i * 7, 13, 7, 2, color);
  rect(3 + i * 7, 15, 7, 2, color);
  rect(2 + i * 7, 17, 7, 1, color);
}
for (let i = 0; i < 9; i++) {
  let color = i % 2 === 0 ? '#d03030' : '#f0e8e0';
  px(3 + i * 7, 18, color);
  px(4 + i * 7, 18, color);
  px(5 + i * 7, 18, color);
}

// === SHOP FRONT — wooden panels ===
rect(8, 19, 48, 32, '#c49060');
rect(9, 19, 46, 32, '#d4a070');
for (let y = 21; y < 51; y += 3) {
  rect(9, y, 46, 1, '#b88050');
}

// === SHOP ENTRANCE — dark opening ===
rect(20, 24, 24, 27, '#2a1820');
rect(21, 25, 22, 26, '#1a1018');

// === SHELVES inside shop ===
rect(22, 28, 10, 1, '#8B6040');
rect(22, 34, 10, 1, '#8B6040');
rect(22, 40, 10, 1, '#8B6040');
rect(33, 28, 9, 1, '#8B6040');
rect(33, 34, 9, 1, '#8B6040');
rect(33, 40, 9, 1, '#8B6040');

// === CANDY ON SHELVES ===
// Top left — pink wrapped candies
rect(22, 26, 3, 2, '#f0a0d0');
rect(25, 26, 3, 2, '#e88abf');
rect(28, 26, 3, 2, '#f0a0d0');
px(23, 27, '#a0e8d0');
px(26, 27, '#a0e8d0');
px(29, 27, '#a0e8d0');

// Top right — umaibo
rect(33, 26, 2, 2, '#ff9040');
rect(35, 26, 2, 2, '#40b0e0');
rect(37, 26, 2, 2, '#e84060');
rect(39, 26, 2, 2, '#60c040');

// Mid left — boxes
rect(22, 31, 4, 3, '#ffd700');
rect(23, 32, 2, 1, '#d03030');
rect(27, 31, 4, 3, '#60b0e8');
rect(28, 32, 2, 1, '#fff');

// Mid right — more snacks
rect(33, 31, 3, 3, '#e84060');
rect(34, 32, 1, 1, '#fff');
rect(37, 31, 2, 3, '#b8a0e8');
rect(40, 31, 2, 3, '#a0e8d0');

// Bottom left — chocolate bars
rect(22, 37, 3, 3, '#6B3520');
rect(25, 37, 3, 3, '#8B4530');
rect(28, 37, 3, 3, '#6B3520');

// Bottom right — gummy / jelly
rect(33, 37, 3, 3, '#f06080');
rect(36, 37, 3, 3, '#80d060');
rect(39, 37, 3, 3, '#f0c040');

// === GACHA MACHINE (left side, sitting on ground) ===
rect(10, 38, 8, 13, '#d04040');
rect(11, 39, 6, 11, '#e05050');
rect(11, 33, 6, 5, '#e0d8d0');
rect(12, 32, 4, 1, '#e0d8d0');
px(12, 34, '#ff6090');
px(14, 33, '#60d0f0');
px(13, 35, '#ffd700');
px(15, 34, '#80e060');
px(14, 36, '#b080e0');
px(12, 36, '#ff9040');
rect(13, 40, 2, 1, '#1a1028');
rect(13, 45, 2, 2, '#1a1028');
rect(13, 31, 2, 1, '#c03030');

// === ICE CREAM FREEZER (right side, sitting on ground) ===
rect(48, 39, 10, 12, '#4090d0');
rect(49, 40, 8, 10, '#60a8e0');
rect(48, 37, 10, 2, '#80c0f0');
rect(50, 43, 6, 3, '#fff');
rect(51, 44, 4, 1, '#d03030');

// === NOREN (shop curtain) ===
rect(21, 24, 5, 4, '#1a3060');
rect(27, 24, 5, 4, '#1a3060');
rect(33, 24, 5, 4, '#1a3060');
rect(26, 25, 1, 3, '#1a1018');
rect(32, 25, 1, 3, '#1a1018');

// === WARM LIGHT GLOW from entrance ===
rect(22, 42, 20, 9, '#2a1820');
px(25, 46, '#3a2030');
px(30, 45, '#3a2030');
px(35, 47, '#3a2030');

// === GROUND ===
rect(0, 51, 64, 13, '#3a3040');
rect(0, 51, 64, 1, '#4a4050');
for (let x = 2; x < 62; x += 5) {
  rect(x, 53 + (x % 3), 3, 2, '#444050');
}

// === LANTERN ===
rect(14, 18, 3, 4, '#ffd700');
rect(15, 19, 1, 2, '#fff8dc');

// === STARS ===
px(5, 3, '#fff8dc');
px(50, 5, '#ffd700');
px(30, 2, '#fff');
px(58, 7, '#fff8dc');
px(12, 6, '#ffd700');
px(42, 3, '#fff');
px(22, 5, '#fff8dc');

</script>
</body>
</html>
