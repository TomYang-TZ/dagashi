<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dagashi</title>
  <meta http-equiv="Content-Security-Policy" content="default-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; connect-src ipc: http://ipc.localhost">
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- CRT overlay -->
  <div class="crt-overlay"></div>

  <!-- Nav bar -->
  <nav id="nav">
    <span class="nav-logo">DAGASHI</span>
    <div class="nav-tabs">
      <button class="nav-tab active" data-page="pull">PULL</button>
      <button class="nav-tab" data-page="gallery">GALLERY</button>
      <button class="nav-tab" data-page="collection">ROSTER</button>
      <button class="nav-tab" data-page="settings">SETTINGS</button>
    </div>
    <div class="deaf-wrapper">
      <button id="deaf-toggle" class="nav-btn" title="Toggle deaf mode (Cmd+Shift+D)">
        <span id="deaf-icon">&#x1F442;</span>
        <span id="deaf-label">LISTENING</span>
      </button>
      <div class="deaf-tooltip">
        PAUSE KEYSTROKE RECORDING<br>
        USE WHEN TYPING SENSITIVE INFO<br>
        SHORTCUT: CMD+SHIFT+D
      </div>
    </div>
  </nav>

  <!-- Pages -->
  <main id="app">
    <div id="page-pull" class="page active"></div>
    <div id="page-gallery" class="page"></div>
    <div id="page-collection" class="page"></div>
    <div id="page-settings" class="page"></div>
  </main>

  <!-- Status bar -->
  <footer id="status-bar">
    <span id="status-keys">KEYS: 0</span>
    <span id="status-deaf"></span>
    <span id="status-time"></span>
  </footer>

  <script src="app.js"></script>
</body>
</html>
